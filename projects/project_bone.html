<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Project | Yooshin Kim</title>
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/projects/project_bone.css" />
    <script src="/js/meta.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <main>
      <div class="frame">
        <div class="content project-shell">
          <div class="project-topbar">
            <p class="eyebrow">Project detail</p>
            <a class="button tertiary" href="/pages/project.html">Back to projects</a>
          </div>
          <article id="content"></article>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const mdFile = params.get("md");
        const content = document.getElementById("content");

        if (!mdFile) {
          content.innerHTML = `<div class="surface-card detail-empty"><h1>No project selected</h1><p>Please return to the project page and choose an item.</p></div>`;
          return;
        }

        try {
          const response = await fetch(`/projects/mds/${mdFile}`);
          if (!response.ok) {
            throw new Error(`Cannot fetch ${mdFile}`);
          }

          const text = await response.text();
          content.innerHTML = `<div class="surface-card markdown-shell">${marked.parse(text)}</div>`;
          document.querySelectorAll("#content pre code").forEach((block) => hljs.highlightElement(block));
        } catch (error) {
          console.error("Error loading markdown:", error);
          content.innerHTML = `<div class="surface-card detail-empty"><h1>Project unavailable</h1><p>The requested project page could not be loaded.</p></div>`;
        }
      });
    </script>
  </body>
</html>
