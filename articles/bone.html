<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Writing | Yooshin Kim</title>
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/articles/bone.css" />
    <script src="/js/meta.js" defer></script>
    <script src="/js/content-utils.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />

    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["$", "$"],
            ["\\(", "\\)"],
          ],
          displayMath: [
            ["$$", "$$"],
            ["\\[", "\\]"],
          ],
          processEnvironments: true,
          packages: ["base", "ams"],
        },
        svg: {
          fontCache: "global",
          scale: 1,
        },
      };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <main>
      <div class="frame">
        <div class="content post-shell">
          <div class="post-topbar">
            <p class="eyebrow">Writing</p>
            <a class="button tertiary" href="/pages/article.html">Back to archive</a>
          </div>
          <div id="post-info" class="surface-card"></div>
          <article id="content"></article>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const mdFile = params.get("md");
        const postInfo = document.getElementById("post-info");
        const content = document.getElementById("content");

        function renderMeta(metadata) {
          const categories = window.ContentUtils
            .splitCategories(metadata.category)
            .map((tag) => `<span class="chip">${window.ContentUtils.escapeHtml(tag)}</span>`)
            .join("");
          const published = metadata.published
            ? `<p class="post-published">${window.ContentUtils.escapeHtml(metadata.published)}</p>`
            : "";

          postInfo.innerHTML = `
            <p class="eyebrow">Article</p>
            <h1>${window.ContentUtils.escapeHtml(metadata.title || "Untitled post")}</h1>
            <p class="post-author">${window.ContentUtils.escapeHtml(metadata.author || "Yooshin Kim")}</p>
            <p class="post-date">${window.ContentUtils.escapeHtml(metadata.date || "Undated")}</p>
            ${published}
            <div class="chip-row">${categories}</div>
          `;
        }

        function wrapTables() {
          document.querySelectorAll("#content table").forEach((table) => {
            const wrapper = document.createElement("div");
            wrapper.className = "table-container";
            table.parentNode.insertBefore(wrapper, table);
            wrapper.appendChild(table);
          });
        }

        async function typesetMath() {
          if (window.MathJax?.startup?.promise) {
            await window.MathJax.startup.promise;
          }
          if (window.MathJax?.typesetPromise) {
            await window.MathJax.typesetPromise([content]);
          }
        }

        if (!mdFile) {
          postInfo.innerHTML = `<h1>Missing article</h1><p>No markdown file was specified.</p>`;
          content.innerHTML = `<p>Select an article from the writing archive.</p>`;
          return;
        }

        try {
          const response = await fetch(`/articles/mds/${mdFile}`);
          if (!response.ok) {
            throw new Error(`Cannot fetch ${mdFile}`);
          }

          const raw = await response.text();
          const parsed = window.ContentUtils.parseFrontMatter(raw);
          const metadata = window.ContentUtils.normalizeMetadata(parsed.metadata);

          renderMeta(metadata);
          content.innerHTML = marked.parse(parsed.content || raw);

          wrapTables();
          document.querySelectorAll("#content pre code").forEach((block) => hljs.highlightElement(block));
          await typesetMath();
        } catch (error) {
          console.error("Error loading markdown:", error);
          postInfo.innerHTML = `<h1>Article unavailable</h1><p>The requested post could not be loaded.</p>`;
          content.innerHTML = `<p>Please return to the archive and try another item.</p>`;
        }
      });
    </script>
  </body>
</html>
