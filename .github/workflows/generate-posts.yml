name: Generate Blog Posts

on:
  push:
    paths:
      - "articles/mds/**"
      - "scripts/generate-posts.js"
      - ".github/workflows/generate-posts.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate posts.json
        run: node scripts/generate-posts.js

      - name: Commit updated posts.json
        run: |
          if git diff --quiet -- articles/posts.json; then
            echo "No posts.json changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/posts.json
          git commit -m "chore: update generated posts metadata"
          git push
